name: Automated Release

on:
  workflow_dispatch: {}
  push:
    branches: [ 'main' ]

concurrency:
  group: auto-release-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  auto-release:
    name: Automated Release from Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Make scripts executable
        run: |
          chmod +x ./scripts/suggest-release-type.sh || true
          chmod +x ./scripts/release.sh || true

      - name: Configure git user for commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine suggested release type
        id: suggest
        run: |
          set -e
          TYPE=$(./scripts/suggest-release-type.sh)
          echo "suggested=${TYPE}"
          echo "suggested=${TYPE}" >> $GITHUB_OUTPUT

      - name: Final suggested release type
        id: final
        run: |
          # Use strict suggestion from primary script only to avoid recursive bumps
          SUGG="${{ steps.suggest.outputs.suggested }}"
          echo "suggested=$SUGG" >> $GITHUB_OUTPUT

      - name: Skip if release commit
        if: startsWith(github.event.head_commit.message, 'chore(release):')
        run: |
          echo "Release commit detected; skipping auto-release to avoid recursion."
          exit 0

      - name: Exit if no release needed
        if: steps.final.outputs.suggested == 'none' || startsWith(github.event.head_commit.message, 'chore(release):')
        run: |
          echo "No release necessary (no versionable commits). Exiting."

      - name: Run standard-version
        if: steps.final.outputs.suggested != 'none' && !startsWith(github.event.head_commit.message, 'chore(release):')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TYPE=${{ steps.final.outputs.suggested }}
          echo "Releasing type: $TYPE"
          if [[ "$TYPE" == "alpha" || "$TYPE" == "beta" || "$TYPE" == "rc" ]]; then
            npx standard-version --prerelease "$TYPE"
          else
            npx standard-version --release-as "$TYPE"
          fi

      - name: Push tags and changelog
        if: steps.final.outputs.suggested != 'none' && !startsWith(github.event.head_commit.message, 'chore(release):')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --follow-tags origin HEAD:main

      - name: Create GitHub Release
        if: steps.final.outputs.suggested != 'none' && !startsWith(github.event.head_commit.message, 'chore(release):')
        uses: softprops/action-gh-release@v1
        with:
          files: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
