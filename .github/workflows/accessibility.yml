name: Accessibility Audit (WCAG 2.1 AA)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0' # Weekly on Sunday at 2 AM

jobs:
  accessibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, libxml, mysql, sqlite, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php -r "file_exists('database/database.sqlite') || mkdir('database') && touch('database/database.sqlite');"

      - name: Run migrations & seed
        env:
          APP_ENV: testing
        run: php artisan migrate:fresh --seed --force

      - name: Build frontend
        run: npm run build

      - name: Start Laravel server
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 &
          sleep 3

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/ >/dev/null 2>&1; then
              echo "Server is up"
              break
            fi
            echo "Waiting for server... attempt $i/30"
            sleep 2
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright accessibility tests
        env:
          BASE_URL: http://127.0.0.1:8000
        run: npm run a11y:playwright

      - name: Run pa11y-ci accessibility audit
        run: |
          npx pa11y-ci --config .pa11yrc.json \
            http://127.0.0.1:8000/ \
            http://127.0.0.1:8000/dashboard

      - name: Generate accessibility report
        if: always()
        run: |
          mkdir -p accessibility-reports
          npx pa11y-ci --config .pa11yrc.json \
            http://127.0.0.1:8000/ \
            http://127.0.0.1:8000/dashboard \
            --reporter json > accessibility-reports/pa11y-report.json || true

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-reports
          path: |
            accessibility-reports/
            test-results/

      - name: Comment PR with accessibility results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## ♿ Accessibility Audit Report\n\n';
            comment += '| Check | Status |\n';
            comment += '|-------|--------|\n';
            comment += '| WCAG 2.1 AA | ✅ Running |\n';
            comment += '| Keyboard Navigation | ✅ Running |\n';
            comment += '| Color Contrast | ✅ Running |\n';
            comment += '| ARIA Labels | ✅ Running |\n';
            comment += '| Form Labels | ✅ Running |\n\n';
            
            if (fs.existsSync('accessibility-reports/pa11y-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('accessibility-reports/pa11y-report.json', 'utf8'));
                comment += `\n**Summary:** ${report.length || 'N/A'} pages audited\n`;
              } catch (e) {
                comment += '\n**Note:** Full report available in artifacts\n';
              }
            }
            
            if (fs.existsSync('test-results/test-results.json')) {
              comment += '\n### Playwright Tests\n';
              comment += 'See artifacts for detailed results\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: WCAG 2.1 AA Compliance Check
        if: failure()
        run: |
          echo "❌ Accessibility issues found"
          echo "Review artifacts for detailed accessibility audit results"
          exit 1
