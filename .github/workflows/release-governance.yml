name: Release Governance

on:
  pull_request:
    branches: ['main', 'develop']
  push:
    branches: ['main', 'develop']
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  commit-convention:
    name: Commit Convention (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs

  version-monotonic:
    name: Version Monotonicity (no downgrade)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package version is not lower than base branch
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          echo "Base branch: ${BASE_BRANCH}"

          git fetch origin "${BASE_BRANCH}" --depth=1

          BASE_VERSION=$(git show "origin/${BASE_BRANCH}:package.json" | node -e 'let content=""; process.stdin.on("data", d => content += d); process.stdin.on("end", () => console.log(JSON.parse(content).version));')
          PR_VERSION=$(node -p "require('./package.json').version")

          echo "Base version: ${BASE_VERSION}"
          echo "PR version:   ${PR_VERSION}"

          node -e '
            const base = process.argv[1];
            const current = process.argv[2];

            const parse = (value) => {
              const [core] = value.split("-");
              const [major = "0", minor = "0", patch = "0"] = core.split(".");
              return [Number(major), Number(minor), Number(patch)];
            };

            const compare = (left, right) => {
              for (let index = 0; index < 3; index += 1) {
                if (left[index] > right[index]) return 1;
                if (left[index] < right[index]) return -1;
              }
              return 0;
            };

            const baseParts = parse(base);
            const currentParts = parse(current);
            const result = compare(currentParts, baseParts);

            if (result < 0) {
              console.error(`❌ package.json version downgrade detected: ${current} < ${base}`);
              process.exit(1);
            }

            console.log(`✅ Version monotonicity passed: ${current} >= ${base}`);
          ' "${BASE_VERSION}" "${PR_VERSION}"

  release-integrity:
    name: Release Integrity (tag/version/changelog)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate tag vs package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version: ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "❌ Tag (${TAG_VERSION}) does not match package.json version (${PACKAGE_VERSION})."
            exit 1
          fi

          echo "✅ Tag and package.json are aligned."

      - name: Validate changelog contains released version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if ! grep -Eq "^##\s*\[?${TAG_VERSION}\]?([[:space:]]|\(|$)" CHANGELOG.md; then
            echo "❌ CHANGELOG.md does not contain an entry for version ${TAG_VERSION}."
            exit 1
          fi

          echo "✅ CHANGELOG.md includes version ${TAG_VERSION}."

      - name: Validate tag points to HEAD
        run: |
          TAG_SHA=$(git rev-list -n 1 "${GITHUB_REF_NAME}")
          HEAD_SHA=$(git rev-parse HEAD)

          echo "Tag SHA:  ${TAG_SHA}"
          echo "Head SHA: ${HEAD_SHA}"

          if [ "${TAG_SHA}" != "${HEAD_SHA}" ]; then
            echo "❌ Tag does not point to the checked-out HEAD commit."
            exit 1
          fi

          echo "✅ Tag points to HEAD commit."
